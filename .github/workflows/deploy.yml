name: deploy

# Publishes dist/ to the gh-pages branch. GitHub auto-enables Pages for a
# gh-pages branch, so no dashboard step and no token beyond the workflow's
# own GITHUB_TOKEN. Live at https://gazzaoneill77-coder.github.io/scriptura/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}
          SITE_URL: https://${{ github.repository_owner }}.github.io
      - name: Push dist to gh-pages
        run: |
          touch dist/.nojekyll
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
